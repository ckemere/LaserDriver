# OpenOCD interface config — SWD bit-banged from Raspberry Pi GPIO.
#
# Wiring (per LaserHAT/gpio_design.md):
#   Pi GPIO 25 -> MSPM0 SWCLK (PA20)
#   Pi GPIO 24 -> MSPM0 SWDIO (PA19)
#   Pi GPIO 18 -> MSPM0 NRST  (chip reset)
#
# Pi 4 exposes the SoC GPIO bank as /dev/gpiochip0; Pi 5 exposes it
# as /dev/gpiochip4 via the RP1 I/O controller.  Override the chip
# number with OPENOCD_GPIOCHIP in the Makefile if you're on a Pi 5.
#
# The user running `make flash` must be in the `gpio` group (default
# on Raspberry Pi OS) to access /dev/gpiochip*.

adapter driver linuxgpiod
adapter speed 1000

# Pi 4 (gpiochip0) by default; the Makefile rewrites these via -c
# when OPENOCD_GPIOCHIP is set to something else.
adapter gpio swclk -chip 0 25
adapter gpio swdio -chip 0 24
adapter gpio srst  -chip 0 18

transport select swd
